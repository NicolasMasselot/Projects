cache:
  sqlite_path: "data/cache/prices.db"
  parquet_dir: "data/cache/parquet"
  ttl_minutes: 15
fetch:
  history_days: 400
  request_timeout_s: 10.0
  max_retries: 3
  backoff_seconds: 2.0
vol:
  window_days: 30
  annualization_factor: 252
  min_observations: 20
regime:
  risk_on_carry_z_min: 0.5
  risk_on_vol_z_max: -0.2
  deleveraging_vol_z_min: 1.0
  deleveraging_carry_z_max: -0.3
  transition_smoothing_days: 5
refresh_seconds: 300
